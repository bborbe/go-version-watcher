version: "2"

run:
  timeout: 10m
  tests: true

linters:
  enable:
    # Core
    - govet
    - errcheck
    - staticcheck
    - unused
    - revive
    - gosec
    - gocyclo
    - depguard
    - dupl

    # SRP & maintainability
    - funlen
    - gocognit
    - nestif
    - maintidx

    # Readability & style
    - errname
    - unparam

    # Safety / defensive coding
    - bodyclose
    - forcetypeassert
    - asasalint
    - prealloc

  settings:
    depguard:
      rules:
        Main:
          deny:
            - pkg: "github.com/pkg/errors"
              desc: "use github.com/bborbe/errors instead"
            - pkg: "github.com/bborbe/argument"
              desc: "use github.com/bborbe/argument/v2 instead"
            - pkg: "golang.org/x/net/context"
              desc: "use context from standard library instead"
            - pkg: "golang.org/x/lint/golint"
              desc: "deprecated, use revive or staticcheck instead"
            - pkg: "io/ioutil"
              desc: "deprecated since Go 1.16, use io and os packages instead"

    funlen:
      lines: 80
      statements: 50

    gocognit:
      min-complexity: 20

    nestif:
      min-complexity: 4

    maintidx:
      min-maintainability-index: 20

    errcheck:
      # Match legacy standalone Makefile `-ignore '(Close|Write|Fprint)'` flag.
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (io.Writer).Write
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln

    gosec:
      # Match legacy standalone Makefile `-exclude=G104` flag.
      # G104 (unhandled errors) is covered by errcheck above — avoid double-reporting.
      excludes:
        - G104

  exclusions:
    presets:
      - comments
      - std-error-handling
      - common-false-positives
    rules:
      - linters:
          - staticcheck
        text: "SA1019"
      - linters:
          - revive
        path: "_test\\.go$"
        text: "dot-imports"
      - linters:
          - revive
        text: "unused-parameter"
      - linters:
          - dupl
        path: "_test\\.go$"
      - linters:
          - unparam
        path: "_test\\.go$"

formatters:
  enable:
    - gofmt
    - goimports
